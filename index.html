<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería PizzaRon | Peñaflor</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --negro: #0B0B0B; --rojo: #8B1E1E; --beige: #F5E6D3; --amarillo: #FFD700; }
        body { font-family: 'Open Sans', sans-serif; background: var(--negro); color: white; margin: 0; scroll-behavior: smooth; }
        
        /* BARRA DE NAVEGACIÓN CON INFO DE CONTACTO (SE MANTIENE) */
        nav { 
            background: #000; 
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--beige); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo-nav { height: 55px; }
        .info-header { border-left: 1px solid #444; padding-left: 20px; display: none; }
        @media (min-width: 768px) { .info-header { display: block; } }
        
        .menu-links a { color: var(--beige); text-decoration: none; font-family: 'Oswald'; margin-left: 20px; text-transform: uppercase; font-size: 0.9rem; font-weight: 700; }

        /* HERO CON UN SOLO BOTÓN */
        .hero { 
            height: 65vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=2000'); 
            background-size: cover; 
            background-position: center;
        }
        .btn-pedido { 
            background: transparent; 
            color: var(--amarillo); 
            padding: 18px 45px; 
            text-decoration: none; 
            font-family: 'Oswald'; 
            border: 2px solid var(--amarillo); 
            font-size: 1.3rem; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-pedido:hover { background: var(--amarillo); color: black; }

        /* ENCUÉNTRANOS SIMPLIFICADO */
        .encuentranos-container { padding: 80px 20px; text-align: center; }
        .social-box { display: flex; justify-content: center; gap: 60px; }
        .icon-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 12px; transition: 0.3s; }
        .icon-circle:hover { transform: scale(1.1); }
        .fb { background: #3b5998; }
        .ig { background: #d6249f; }

        /* SECCIÓN MAPA */
        .map-section { background: #000; width: 100%; }
        .map-header { padding: 15px 5%; background: #111; border-top: 1px solid #333; }
        .btn-maps { background: transparent; color: white; border: 1px solid #555; padding: 7px 15px; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; }
        .mapa-iframe { width: 100%; height: 450px; border: none; filter: grayscale(1) invert(0.92); }
    </style>
</head>
<body>

    <nav>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="index.html"><img src="logo.png" class="logo-nav" alt="PizzaRon"></a>
            <div class="info-header">
                <div style="color: var(--amarillo); font-weight: bold; font-size: 0.9rem; font-family: 'Oswald';">
                    📞 PEDIDOS: 9 8744 3238
                </div>
                <div style="color: #aaa; font-size: 0.7rem; text-transform: uppercase;">
                    📍 PEÑAFLOR • PELVÍN • MALLOCO
                </div>
            </div>
        </div>

        <div class="menu-links">
            <a href="#">INICIO</a>
            <a href="menu.html">MENÚ ONLINE</a>
            <a href="#encuentranos">UBICACIÓN</a>
        </div>
    </nav>

    <section class="hero">
        <a href="menu.html" class="btn-pedido">PEDIR AHORA ></a>
    </section>

    <section class="encuentranos-container" id="encuentranos">
        <h2 style="font-family: 'Oswald'; font-size: 2.5rem; color: var(--beige); margin-bottom: 40px; text-transform: uppercase;">ENCUÉNTRANOS</h2>
        
        <div class="social-box">
            <a href="https://facebook.com" class="social-item" style="text-decoration:none; color:white;">
                <div class="icon-circle fb"><i class="fab fa-facebook-f"></i></div>
                <span style="font-size: 0.8rem; color: #888; font-weight: 600;">FACEBOOK</span>
            </a>
            <a href="https://instagram.com" class="social-item" style="text-decoration:none; color:white;">
                <div class="icon-circle ig"><i class="fab fa-instagram"></i></div>
                <span style="font-size: 0.8rem; color: #888; font-weight: 600;">INSTAGRAM</span>
            </a>
        </div>
    </section>

    <div class="map-section">
        <div class="map-header">
            <a href="https://maps.google.com" target="_blank" class="btn-maps">Abrir en Maps</a>
        </div>
        <iframe class="mapa-iframe" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3324.4567!2d-70.8789!3d-33.6067!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzPCsDM2JzI0LjEiUyA3MMKwNTInNDQuMCJX!5e0!3m2!1ses!2scl!4v123456789"></iframe>
    </div>

</body>
</html>
